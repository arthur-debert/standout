# Release standout — thin caller into the canonical rust-lib reusable
# workflow at `arthur-debert/release/.github/workflows/rust-lib.yml`.
#
# Trigger model: **workflow_dispatch** (replaces the previous tag-push
# trigger on `standout-v*`). The canonical workflow's prepare-release
# action drives bump + commit + tag + push, so this caller only needs
# the version input.
#
# To cut a release:
#   gh workflow run release.yml --ref main -f version=0.X.Y
# Or via the Actions tab "Run workflow" button.
#
# Migration: replaces .github/workflows/publish.yml (a hand-rolled
# tag-push workflow that called scripts/ci-publish-crate.sh per crate
# with 30s sleeps between). The canonical workflow's publish-crate
# composite action handles the same per-crate-in-order publish via the
# same scripts/ci-publish-crate.sh (which lives in arthur-debert/
# release) and defaults wait-seconds=0 since cargo 1.66+'s sparse
# index doesn't need the manual sleep. If 0 turns out to flake, bump
# this caller to pass wait-seconds=30 explicitly via a future
# rust-lib.yml input.

name: Release standout

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (bare semver, e.g. 0.8.1 — no leading v)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    uses: arthur-debert/release/.github/workflows/rust-lib.yml@v1
    with:
      version: ${{ inputs.version }}
      # Topological order (deps before dependents). standout-test and
      # todo-example carry `publish = false` so they're excluded.
      # standout-render depends on standout-bbparser; standout (trunk)
      # depends on all seven above — preserved from the old
      # publish.yml's documented ordering.
      crates: standout-bbparser,standout-macros,standout-pipe,standout-dispatch,standout-input,standout-seeker,standout-render,standout
      changelog-path: CHANGELOG.md
    secrets:
      RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
      CRATES_IO_KEY: ${{ secrets.CRATES_IO_KEY }}
