name: Publish to crates.io

on:
  push:
    tags:
      - 'standout-v[0-9]+.[0-9]+.[0-9]+'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # Use scripts/ci-publish-crate.sh for robust two-tier "already
      # published" detection: pre-check via crates.io JSON API + grep
      # cargo's publish output for "already exists on crates.io index"
      # / "already uploaded". Same pattern as dodot/padz/rustloc/lex-fmt.
      # Replaces bare `cargo publish` calls which would abort retries
      # on partial-publish state.
      - name: Publish standout-bbparser
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_KEY }}
        run: scripts/ci-publish-crate.sh standout-bbparser

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish standout-macros
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_KEY }}
        run: scripts/ci-publish-crate.sh standout-macros

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish standout
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_KEY }}
        run: scripts/ci-publish-crate.sh standout
